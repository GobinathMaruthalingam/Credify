<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNM Labs | Coming Soon</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Yellowtail&display=swap"
        rel="stylesheet">

    <!-- Tailwind Play CDN for rapid, consistent styling of structure (keeping it modern) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Configuration to extend theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        script: ['Yellowtail', 'cursive'],
                    },
                    colors: {
                        'brand-dark': '#0f172a',
                    }
                }
            }
        }
    </script>

    <!-- Custom styles for specifics not easily covered by atomic classes -->
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }

        /* Ambient Background Image with slow zoom */
        .bg-ambient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: -2;
            animation: slowParallax 40s ease-in-out infinite alternate;
            transform-origin: center;
        }

        @keyframes slowParallax {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        /* Dark Vignette Overlay */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.85) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Custom Script Title */
        .title-script {
            font-family: 'Yellowtail', cursive;
            font-size: clamp(5rem, 15vw, 11rem);
            color: #ffffff;
            line-height: 1.1;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Glow effect animation */
            animation: textFloat 6s ease-in-out infinite alternate;
        }

        @keyframes textFloat {
            0% {
                transform: translateY(0px);
                text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            100% {
                transform: translateY(-15px);
                text-shadow: 0 25px 40px rgba(0, 0, 0, 0.7);
            }
        }

        /* Subscribe Input */
        .subscribe-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 0.875rem;
            padding: 8px 0;
            width: 200px;
            transition: all 0.3s;
            outline: none;
        }

        .subscribe-input:focus {
            border-bottom-color: white;
            width: 240px;
        }

        .subscribe-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .subscribe-arrow {
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .subscribe-form:hover .subscribe-arrow {
            opacity: 1;
        }

        /* Social Icons */
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
        }

        .social-link:hover {
            color: white;
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        /* Loading Fade */
        body {
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="text-white font-sans flex flex-col justify-between absolute inset-0">

    <div class="bg-ambient"></div>
    <div class="vignette"></div>

    <!-- Header / Navbar -->
    <header class="flex justify-between items-start w-full px-8 py-10 sm:px-16 sm:py-12 relative z-10">
        <!-- Logo & Motto -->
        <div class="flex flex-col">
            <h1 class="text-3xl font-black tracking-tight" style="letter-spacing: -0.05em;">GNM Labs.</h1>
            <p class="text-[0.65rem] font-bold uppercase tracking-[0.2em] text-white/50 mt-1 pl-1">What not!</p>
        </div>

        <!-- Countdown -->
        <div class="hidden sm:flex items-center gap-6 mt-1" id="countdown">
            <div class="flex items-baseline gap-1">
                <span class="text-2xl font-bold" id="days">03</span>
                <span class="text-xs uppercase tracking-wider text-white/70">Days</span>
            </div>
            <div class="flex items-baseline gap-1">
                <span class="text-2xl font-bold" id="hours">18</span>
                <span class="text-xs uppercase tracking-wider text-white/70">Hr</span>
            </div>
            <div class="flex items-baseline gap-1">
                <span class="text-2xl font-bold" id="minutes">59</span>
                <span class="text-xs uppercase tracking-wider text-white/70">Min</span>
            </div>
            <div class="flex items-baseline gap-1">
                <span class="text-2xl font-bold" id="seconds">58</span>
                <span class="text-xs uppercase tracking-wider text-white/70">Sec</span>
            </div>
        </div>
    </header>

    <!-- Main Content (Center) -->
    <main class="flex-1 flex flex-col items-center justify-center relative z-10 mt-[-5vh]">
        <h2 class="title-script text-center select-none">Coming Soon</h2>

    </main>

    <!-- Footer -->
    <footer
        class="flex flex-col sm:flex-row justify-between items-center w-full px-8 py-10 sm:px-16 relative z-10 gap-8">
        <!-- Socials -->
        <div class="flex gap-4">
            <a href="https://www.linkedin.com/in/gobinath-maruthalingam/" target="_blank" rel="noopener noreferrer"
                class="social-link" aria-label="LinkedIn">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                </svg>
            </a>
        </div>

        <!-- Subscribe Form -->
        <form class="subscribe-form flex items-center relative group" id="subscribeForm"
            onsubmit="handleSubscribe(event)">
            <input type="email" id="emailInput" placeholder="Email Address" class="subscribe-input" required>
            <button type="submit" id="submitBtn"
                class="absolute right-0 top-1/2 -translate-y-1/2 text-white/50 hover:text-white subscribe-arrow px-2"
                aria-label="Submit">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
            <div id="successMsg"
                class="hidden absolute right-0 text-sm font-bold text-emerald-400 whitespace-nowrap opacity-0 transition-opacity duration-500">
                You'll be notified!
            </div>
        </form>
    </footer>

    <!-- Countdown Logic -->
    <script>
        // Set a launch date 3 days from now
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 3);

        function updateTimer() {
            const now = new Date().getTime();
            const distance = launchDate.getTime() - now;

            if (distance < 0) return;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Subscribe Form Logic
        function handleSubscribe(e) {
            e.preventDefault();
            const input = document.getElementById('emailInput');
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('successMsg');

            // Fade out input and button
            input.style.opacity = '0';
            btn.style.opacity = '0';

            setTimeout(() => {
                input.style.display = 'none';
                btn.style.display = 'none';

                // Show success message
                msg.classList.remove('hidden');
                setTimeout(() => {
                    msg.style.opacity = '1';
                }, 50);
            }, 300);
        }
    </script>
</body>

</html>
